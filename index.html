<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trabzon Fırını</title>
    <link href="static/bootstrap-5.3.3-dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="static/css/style.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6d356bd1a4.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="">

    <div class="sidebar">
        <div class="menu-items mt-5">
            <div class="left-logo text-center">
                <img src="static/img/logo.svg" alt="Trabzon Fırını Logo" style="width: 60%;">
            </div>
            <div class="menu-links m-5 p-5">
                <a href="#carouselExampleAutoplaying" class="">Anasayfa</a>
                <a href="#urunler">Ürünler</a>
                <a href="#franchise">Franchise</a>
                <a href="#kurumsal">Kurumsal</a>
                <a href="#footer">İletişim</a>
            </div>
        </div>
        <div class="footer m-0">
            <div class="fs-6 fw-lighter">
                <p>Yeşilköy Mah. İzmir Aydın Cad. No: 58/B<br>Torbalı / İZMİR</p>
            </div>

            <p>
                <a href="https://www.instagram.com/trabzonfirini" style="text-decoration: none;" target="_blank"
                    class="text-white">
                    <i class="fab fa-instagram m-1"></i>
                </a>
                <i> / trabzonfirini</i>
            </p>

            <small>
                <p>Copyright © 2024 Trabzon Fırını. All Rights Reserved.</p>
            </small>
        </div>
    </div>



    <div class="content">
        <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="static/img/slide1.webp" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="static/img/slide1.webp" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="static/img/slide1.webp" class="d-block w-100">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

        <div class="container" id="urunler">
            <div class="p-5 fw-bold mx-4">
                <h1 class="w-auto">Ürünlerimiz</h1>
                <div class="row">
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <img src="static/img/u_1.png" class="d-block w-100">
                    </div>
                </div>
                <h4 class="text-center p-4 m-4">
                    <a href="#">
                        Tüm Ürünler
                    </a>
                </h4>
            </div>
        </div>

        <div id="franchise">
            <img src="static/img/franchise.png" class="d-block w-100">
        </div>

        <div class="container">
            <div class="p-5 fw-bold mx-4">
                <h1 id="kurumsal">Fırın Konseptimiz</h1>

                <div class="row">
                    <div class="col-4">
                        <img src="static/img/f1.png" class="d-block w-100 my-4">
                    </div>
                    <div class="col-4">
                        <img src="static/img/f2.png" class="d-block w-100 my-4">
                    </div>
                    <div class="col-4">
                        <img src="static/img/f3.png" class="d-block w-100 my-4">
                    </div>
                </div>


                <div id="footer">
                    <img src="static/img/subs.png" class="d-block w-100 my-4">
                    <img src="static/img/foot.png" class="d-block w-100 my-4">
                    <hr>
                </div>
            </div>
        </div>

        <script src="static/bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.2/dist/chart.umd.js"
            integrity="sha384-eI7PSr3L1XLISH8JdDII5YN/njoSsxfbrkCTnJrzXt+ENP5MOVBxD+l6sEG4zoLp"
